<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Loading...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader {
      text-align: center;
      opacity: 0.6;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 13px; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <script src="/uv.bundle.js"></script>
  <script src="/uv.config.js"></script>
  <script src="/assets/js/common.js"></script>
  <script>
    (function() {
      var TARGET = 'https://67movies.net/';
      function launch() {
        setAuthCookie("__cor_auth=1", true);
        var encoded = xor.encode(TARGET);
        window.location.href = '/service/' + encoded;
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: __uv$config.prefix })
          .then(function(reg) {
            if (reg.active) {
              launch();
            } else {
              var sw = reg.installing || reg.waiting;
              sw.addEventListener('statechange', function() {
                if (sw.state === 'activated') launch();
              });
            }
          })
          .catch(function() { launch(); });
      } else {
        launch();
      }
    })();
  </script>
</body>
</html>
